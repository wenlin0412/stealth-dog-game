<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>別尿在地毯上</title>
    <!-- 引入 Google 復古像素字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #2c2c54;
            --sky-bottom: #706fd3;
            --ui-bg: #130f40;
            --ui-border: #a29bfe;
            --text-light: #f1f2f6;
            --btn-bg: #4834d4;
            --btn-hover: #f9ca24;
            --pee: #f1c40f;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #1e1e2f;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden; touch-action: none; user-select: none;
            display: flex; justify-content: center; align-items: center;
        }
        
        #app-container {
            position: relative;
            width: 100%; height: 100%;
            max-width: 900px; max-height: 506px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 遊戲畫布 - 強制像素化渲染 */
        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* UI 圖層 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* 頂部狀態列 */
        #top-bar {
            padding: 15px; display: flex; justify-content: space-between; align-items: flex-start;
        }
        #level-text {
            font-size: 10px; color: var(--text-light); line-height: 1.5;
            background: rgba(19, 15, 64, 0.8); padding: 8px 12px;
            border: 2px solid var(--ui-border);
        }
        #progress-container {
            width: 150px; height: 16px; background: #000;
            border: 2px solid #fff; display: none; padding: 2px;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--pee);
        }

        /* 虛擬操作按鈕 (像素風格) */
        #controls {
            padding: 15px; display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto; display: none;
        }
        .btn-group { display: flex; gap: 10px; }
        .btn {
            background: var(--btn-bg); color: var(--text-light);
            border: 2px solid #fff; box-shadow: 2px 2px 0 #000;
            padding: 12px 10px; font-size: 10px; font-family: 'Press Start 2P', monospace;
            cursor: pointer; text-transform: uppercase;
        }
        .btn:active, .btn.active {
            transform: translate(2px, 2px); box-shadow: none;
            background: var(--btn-hover); color: #000;
        }
        #btn-pee { background: #eb4d4b; }
        #btn-pee:active, #btn-pee.active { background: var(--pee); color: #000; }

        /* 全螢幕覆蓋選單 (復古對話框 Dialogue Box) */
        #overlay-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto;
        }
        
        .dialogue-box {
            background: var(--ui-bg);
            border: 4px solid #fff;
            padding: 25px 20px;
            box-shadow: inset 0 0 0 4px var(--ui-bg), inset 0 0 0 8px var(--ui-border), 6px 6px 0 rgba(0,0,0,0.8);
            text-align: center;
            width: 80%; max-width: 350px;
        }

        #menu-title { 
            font-size: 16px; color: var(--pee); margin: 0 0 20px 0; 
            line-height: 1.5; text-shadow: 2px 2px 0 #000;
        }
        #menu-subtitle { 
            font-size: 8px; color: var(--text-light); margin-bottom: 30px; 
            line-height: 2;
        }
        #menu-btn {
            background: transparent; color: #fff; border: none;
            font-size: 12px; font-family: 'Press Start 2P', monospace;
            cursor: pointer; padding: 10px; position: relative;
        }
        #menu-btn::before {
            content: '▶'; position: absolute; left: -15px; top: 10px;
            color: var(--pee); opacity: 0; animation: blink 0.8s infinite;
        }
        #menu-btn:hover::before { opacity: 1; }
        #menu-btn:active { color: var(--pee); }

        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        @media (max-width: 600px) {
            #menu-title { font-size: 14px; }
            #menu-subtitle { font-size: 7px; }
            .btn { font-size: 8px; padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- 原生 Canvas 畫布 (低解析度 400x225 創造像素感) -->
        <canvas id="gameCanvas" width="400" height="225"></canvas>
        
        <!-- UI 控制圖層 -->
        <div id="ui-layer">
            <div id="top-bar">
                <div id="level-text">LOADING...</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
            </div>
            <div id="controls">
                <div class="btn-group">
                    <button class="btn" id="btn-left">◀ LEFT</button>
                    <button class="btn" id="btn-right">RIGHT ▶</button>
                </div>
                <button class="btn" id="btn-pee">PEE (HOLD)</button>
            </div>
        </div>

        <!-- 復古對話框選單 -->
        <div id="overlay-menu">
            <div class="dialogue-box">
                <h1 id="menu-title">STEALTH DOG<br>16-BIT</h1>
                <div id="menu-subtitle">HIDE IN SHADOWS.<br>AVOID THE OWNER.</div>
                <button id="menu-btn">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * 復古 8-bit / 16-bit 遊戲核心邏輯
         * 座標與尺寸皆為原生版的一半，以適應 400x225 的低解析度畫布
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const menuOverlay = document.getElementById('overlay-menu');
        const menuTitle = document.getElementById('menu-title');
        const menuSubtitle = document.getElementById('menu-subtitle');
        const menuBtn = document.getElementById('menu-btn');
        const controls = document.getElementById('controls');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const levelText = document.getElementById('level-text');

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnPee = document.getElementById('btn-pee');

        // 柔和的藍紫像素調色盤
        const PALETTE = {
            dogDark: '#192a56', dogLight: '#e1b12c',
            ownerBody: '#40739e', ownerSkin: '#fbc531', ownerPants: '#273c75',
            vision: 'rgba(251, 197, 49, 0.3)', visionDanger: 'rgba(232, 65, 24, 0.5)',
            floor: '#2c2c54', rug: '#6a89cc'
        };

        // 關卡設計 (尺寸縮半)
        const LEVELS = [
            {
                name: "STAGE 1: LIVING ROOM", bg: '#341f97', 
                obstacles: [ { x: 125, w: 60, h: 40, type: 'sofa', color: '#ff9ff3' }, { x: 275, w: 50, h: 35, type: 'cabinet', color: '#00d2d3' } ],
                ownerSpeed: 40, patrol: [325, 50], vision: 140
            },
            {
                name: "STAGE 2: DINING", bg: '#5f27cd',
                obstacles: [ { x: 175, w: 45, h: 40, type: 'table', color: '#48dbfb' } ],
                ownerSpeed: 55, patrol: [350, 25], vision: 175
            },
            {
                name: "STAGE 3: BEDROOM", bg: '#222f3e', 
                obstacles: [ { x: 150, w: 70, h: 35, type: 'bed', color: '#54a0ff' } ],
                ownerSpeed: 75, patrol: [350, 25, 225, 25], vision: 200
            }
        ];

        let state = {
            screen: 'menu', levelIdx: 0, progress: 0, maxProgress: 100, time: 0, lastFrameTime: 0
        };

        let dog = { x: 50, y: 180, dir: 1, speed: 100, isMoving: false, isPeeing: false };
        let owner = { x: 350, y: 170, dir: -1, patrolIdx: 0 };
        let particles = [];
        let input = { left: false, right: false, pee: false };

        // 背景特效資料 (星星與雲朵)
        let stars = Array.from({length: 40}, () => ({
            x: Math.random() * 400, y: Math.random() * 120, 
            size: Math.random() > 0.8 ? 2 : 1, timer: Math.random() * Math.PI * 2
        }));
        let clouds = [
            { x: 50, y: 30, speed: 5, shape: [[0,0,40,20], [10,-10,20,10], [-10,10,60,10]] },
            { x: 250, y: 60, speed: 8, shape: [[0,0,30,15], [5,-8,15,8], [-5,8,45,8]] },
            { x: -50, y: 80, speed: 3, shape: [[0,0,50,25], [15,-12,25,12], [-15,12,80,12]] }
        ];

        // --- 繪圖函數：像素風格 ---
        function drawPixelRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
        }

        function drawSky(time, dt) {
            // 背景漸層
            let gradient = ctx.createLinearGradient(0, 0, 0, 150);
            // 修復：Canvas 無法直接解析 CSS 變數字串，替換為實際的十六進位色碼
            gradient.addColorStop(0, '#2c2c54');
            gradient.addColorStop(1, '#706fd3');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 225);

            // 閃爍星星
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                s.timer += dt * 3;
                if (Math.sin(s.timer) > 0) {
                    drawPixelRect(s.x, s.y, s.size, s.size, '#fff');
                }
            });

            // 移動像素雲朵
            clouds.forEach(c => {
                c.x += c.speed * dt;
                if (c.x > 450) c.x = -80;
                c.shape.forEach(rect => {
                    drawPixelRect(c.x + rect[0], c.y + rect[1], rect[2], rect[3], 'rgba(200, 214, 229, 0.4)');
                });
            });
        }

        function drawDog(x, y, dir, isMoving, isPeeing, time) {
            ctx.save();
            ctx.translate(Math.floor(x), Math.floor(y));
            if (dir < 0) ctx.scale(-1, 1);
            
            let bounce = (isMoving && !isPeeing) ? (Math.sin(time * 20) > 0 ? 2 : 0) : 0;
            ctx.translate(0, -bounce);

            // 身體
            drawPixelRect(-15, -10, 30, 15, PALETTE.dogDark);
            
            // 腳
            if (isPeeing) {
                drawPixelRect(5, 5, 4, 10, PALETTE.dogLight);  // 前腳
                drawPixelRect(-15, 2, 10, 4, PALETTE.dogLight); // 抬起的後腳
            } else {
                let legAnim = isMoving ? (Math.sin(time * 20) > 0 ? 3 : -3) : 0;
                drawPixelRect(-12 + legAnim, 5, 4, 10, PALETTE.dogLight);
                drawPixelRect(8 - legAnim, 5, 4, 10, PALETTE.dogLight);
            }

            // 頭部與耳朵
            if (isPeeing) { ctx.translate(0, 3); }
            drawPixelRect(10, -18, 14, 14, PALETTE.dogDark); // 頭
            drawPixelRect(24, -10, 6, 6, PALETTE.dogLight);  // 鼻子
            drawPixelRect(28, -10, 2, 2, '#000');           // 鼻頭
            drawPixelRect(5, -24, 4, 6, PALETTE.dogDark);    // 耳朵
            drawPixelRect(12, -22, 6, 2, PALETTE.dogLight);  // 眉毛
            drawPixelRect(16, -14, 2, 2, '#fff');           // 眼睛

            // 尾巴
            let tailY = isPeeing ? -5 : (Math.sin(time*15) > 0 ? -12 : -8);
            drawPixelRect(-22, tailY, 8, 4, PALETTE.dogDark);

            ctx.restore();
        }

        function drawOwner(x, y, dir, isAlert, time) {
            ctx.save();
            ctx.translate(Math.floor(x), Math.floor(y));
            
            if (isAlert) { ctx.translate((Math.sin(time * 50) > 0 ? 2 : -2), 0); }
            if (dir < 0) ctx.scale(-1, 1);

            // 腳
            let legAnim = (!isAlert) ? (Math.sin(time * 15) > 0 ? 3 : -3) : 0;
            drawPixelRect(-6 + legAnim, 15, 4, 12, PALETTE.ownerPants);
            drawPixelRect(2 - legAnim, 15, 4, 12, PALETTE.ownerPants);

            // 身體
            drawPixelRect(-8, -5, 16, 20, PALETTE.ownerBody);

            // 頭
            drawPixelRect(-7, -18, 14, 14, PALETTE.ownerSkin);
            
            // 眼睛
            if (isAlert) {
                drawPixelRect(3, -16, 4, 2, '#000'); // 生氣眉毛
                drawPixelRect(5, -13, 2, 2, '#000');
            } else {
                drawPixelRect(5, -14, 2, 2, '#000');
            }

            // 驚嘆號 (像素版)
            if (isAlert) {
                drawPixelRect(-2, -35, 4, 10, '#e84118');
                drawPixelRect(-2, -23, 4, 4, '#e84118');
            }

            ctx.restore();
        }

        function drawObstacle(obs) {
            let cx = Math.floor(obs.x);
            let cy = 185 - obs.h;
            
            if (obs.type === 'sofa') {
                drawPixelRect(cx+5, cy+10, obs.w-10, obs.h-10, obs.color);
                drawPixelRect(cx, cy+15, 10, obs.h-15, '#e84393');
                drawPixelRect(cx+obs.w-10, cy+15, 10, obs.h-15, '#e84393');
            } else if (obs.type === 'cabinet') {
                drawPixelRect(cx, cy, obs.w, obs.h, obs.color);
                drawPixelRect(cx+5, cy+5, obs.w/2-8, obs.h-10, '#01a3a4');
                drawPixelRect(cx+obs.w/2+3, cy+5, obs.w/2-8, obs.h-10, '#01a3a4');
            } else if (obs.type === 'table') {
                drawPixelRect(cx+5, cy+5, 4, obs.h-5, '#0abde3');
                drawPixelRect(cx+obs.w-9, cy+5, 4, obs.h-5, '#0abde3');
                drawPixelRect(cx, cy, obs.w, 8, obs.color);
            } else if (obs.type === 'bed') {
                drawPixelRect(cx, cy, 8, obs.h, '#2e86de');
                drawPixelRect(cx, cy+obs.h-15, obs.w, 15, obs.color);
                drawPixelRect(cx+10, cy+obs.h-22, 15, 8, '#fff');
            }
        }

        // --- 遊戲邏輯更新 ---
        function update(dt) {
            if (state.screen !== 'playing') return;
            state.time += dt;
            const level = LEVELS[state.levelIdx];

            dog.isMoving = false;
            dog.isPeeing = false;

            if (input.pee) {
                dog.isPeeing = true;
                state.progress += dt * 25;
                progressBar.style.width = Math.min((state.progress / state.maxProgress) * 100, 100) + '%';
                
                // 產生像素水滴
                if (Math.random() < 0.3) {
                    particles.push({
                        x: dog.x + (dog.dir > 0 ? -10 : 10), y: dog.y + 5,
                        vx: (Math.random() - 0.5) * 30, vy: 50 + Math.random() * 30, life: 1
                    });
                }

                if (state.progress >= state.maxProgress) winLevel();
            } else {
                if (input.left) { dog.x -= dog.speed * dt; dog.dir = -1; dog.isMoving = true; }
                if (input.right) { dog.x += dog.speed * dt; dog.dir = 1; dog.isMoving = true; }
            }
            if (dog.x < 15) dog.x = 15;
            if (dog.x > 385) dog.x = 385;

            // 更新主人
            let targetX = level.patrol[owner.patrolIdx];
            if (Math.abs(owner.x - targetX) < 2) {
                owner.patrolIdx = (owner.patrolIdx + 1) % level.patrol.length;
            } else {
                let moveDir = targetX > owner.x ? 1 : -1;
                owner.x += moveDir * level.ownerSpeed * dt;
                owner.dir = moveDir;
            }

            // 更新水滴
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 2;
                if (p.life <= 0 || p.y > 185) particles.splice(i, 1);
            }

            // 視線運算
            let eyeX = owner.x + (owner.dir > 0 ? 8 : -8);
            let closestObsX = owner.dir > 0 ? eyeX + level.vision : eyeX - level.vision;
            let hitObstacle = false;

            level.obstacles.forEach(obs => {
                let leftEdge = obs.x;
                let rightEdge = obs.x + obs.w;
                if (owner.dir > 0 && leftEdge > eyeX && leftEdge < closestObsX) {
                    closestObsX = leftEdge; hitObstacle = true;
                } else if (owner.dir < 0 && rightEdge < eyeX && rightEdge > closestObsX) {
                    closestObsX = rightEdge; hitObstacle = true;
                }
            });

            owner.visionEnd = closestObsX;
            owner.hitObstacle = hitObstacle;

            // 判定發現
            let isDogInDir = (owner.dir > 0 && dog.x > eyeX) || (owner.dir < 0 && dog.x < eyeX);
            if (isDogInDir && Math.abs(dog.x - eyeX) < level.vision) {
                let distToDog = Math.abs(dog.x - eyeX);
                let distToObs = Math.abs(closestObsX - eyeX);
                if (distToDog < distToObs + 8) { 
                    if (dog.isPeeing) gameOver();
                }
            }
        }

        // --- 渲染畫面 ---
        function draw() {
            let dt = (Date.now() - state.lastFrameTime) / 1000 || 0;
            const level = LEVELS[state.levelIdx] || LEVELS[0];
            
            drawSky(state.time, dt);
            
            // 牆壁下半部與地板
            drawPixelRect(0, 150, 400, 35, level.bg);
            drawPixelRect(0, 185, 400, 40, PALETTE.floor);
            
            // 地毯 (像素格紋)
            drawPixelRect(20, 188, 360, 8, PALETTE.rug);
            for(let i=20; i<380; i+=10) { drawPixelRect(i, 188, 5, 8, 'rgba(0,0,0,0.1)'); }

            // 物件
            level.obstacles.forEach(obs => drawObstacle(obs));

            // 水滴
            ctx.fillStyle = '#f1c40f'; // 修復：移除錯誤的變數指派語法
            particles.forEach(p => { drawPixelRect(p.x, p.y, 2, 2, '#f1c40f'); });

            // 角色
            drawDog(dog.x, dog.y, dog.dir, dog.isMoving, dog.isPeeing, state.time);

            // 視線 (多邊形)
            if (state.screen === 'playing' || state.screen === 'gameover') {
                let eyeX = Math.floor(owner.x + (owner.dir > 0 ? 8 : -8));
                let eyeY = Math.floor(owner.y - 15);
                let endX = Math.floor(owner.visionEnd);
                
                ctx.fillStyle = state.screen === 'gameover' ? PALETTE.visionDanger : PALETTE.vision;
                ctx.beginPath();
                ctx.moveTo(eyeX, eyeY - 5);
                ctx.lineTo(eyeX, eyeY + 5);
                ctx.lineTo(endX, eyeY + (owner.hitObstacle ? 5 : 40));
                ctx.lineTo(endX, eyeY - 10);
                ctx.closePath();
                ctx.fill();
            }

            drawOwner(owner.x, owner.y, owner.dir, state.screen === 'gameover', state.time);
        }

        function loop(timestamp) {
            if (!state.lastFrameTime) state.lastFrameTime = timestamp;
            let dt = (timestamp - state.lastFrameTime) / 1000;
            state.lastFrameTime = timestamp;
            if (dt > 0.1) dt = 0.1;

            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        // --- 流程與選單 ---
        function startGame() {
            state.screen = 'playing';
            state.progress = 0; progressBar.style.width = '0%';
            dog.x = 40; dog.dir = 1;
            const lvl = LEVELS[state.levelIdx];
            owner.x = lvl.patrol[0]; owner.patrolIdx = 0; owner.dir = -1;
            particles = [];

            menuOverlay.style.display = 'none';
            controls.style.display = 'flex';
            progressContainer.style.display = 'block';
            levelText.innerText = lvl.name;
        }

        function showMenu(title, sub, btnText, isAllClear) {
            menuTitle.innerHTML = title;
            menuSubtitle.innerHTML = sub;
            menuBtn.innerText = btnText;
            menuOverlay.style.display = 'flex';
            progressContainer.style.display = 'none';
            if (isAllClear) state.levelIdx = 0;
            menuBtn.onclick = startGame;
        }

        function gameOver() {
            state.screen = 'gameover';
            controls.style.display = 'none';
            setTimeout(() => { showMenu("GAME OVER", "YOU WERE CAUGHT.", "CONTINUE", false); }, 1500);
        }

        function winLevel() {
            state.screen = 'win';
            controls.style.display = 'none';
            setTimeout(() => {
                state.levelIdx++;
                if (state.levelIdx >= LEVELS.length) {
                    showMenu("YOU WIN!", "GOOD DOG.", "PLAY AGAIN", true);
                } else {
                    showMenu("STAGE CLEAR", "READY FOR NEXT STAGE.", "CONTINUE", false);
                }
            }, 1000);
        }

        // --- 綁定輸入 ---
        function bindBtn(element, keyName) {
            const down = (e) => { e.preventDefault(); input[keyName] = true; element.classList.add('active'); };
            const up = (e) => { e.preventDefault(); input[keyName] = false; element.classList.remove('active'); };
            element.addEventListener('mousedown', down);
            element.addEventListener('touchstart', down, {passive: false});
            element.addEventListener('mouseup', up);
            element.addEventListener('mouseleave', up);
            element.addEventListener('touchend', up);
        }

        bindBtn(btnLeft, 'left'); bindBtn(btnRight, 'right'); bindBtn(btnPee, 'pee');

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') input.left = true;
            if (e.key === 'ArrowRight') input.right = true;
            if (e.key === ' ' || e.key === 'Spacebar') input.pee = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') input.left = false;
            if (e.key === 'ArrowRight') input.right = false;
            if (e.key === ' ' || e.key === 'Spacebar') input.pee = false;
        });

        menuBtn.onclick = startGame;
        requestAnimationFrame(loop);

    </script>
</body>
</html>
